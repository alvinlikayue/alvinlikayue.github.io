<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <input class="menu-state" type="checkbox" id="menu-state" aria-label="Toggle navigation">

    <aside class="sidebar" aria-label="Primary navigation">
        <label class="menu-toggle" for="menu-state">Menu</label>

        <a class="sidebar-title" href="{{ '/' | relative_url }}">
            <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="">
            <span>
                <strong>{{ site.title }}</strong>
                <small>Gravitational-wave physics</small>
            </span>
        </a>

        <nav class="site-nav">
            {% for item in site.navigation %}
                <a href="{{ item.url | relative_url }}" {% if page.nav_key == item.key %}aria-current="page"{% endif %}>{{ item.title }}</a>
            {% endfor %}
        </nav>
    </aside>

    <main class="page-shell" id="content">
        <article class="content-panel">
            {{ content }}
        </article>
    </main>

    <script src="{{ '/assets/js/slideshow.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/mentor-map.js' | relative_url }}"></script>

    <footer class="site-footer">
        <span>&copy; {{ "now" | date: "%Y" }} {{ site.title }}</span>
        <span>Built with GitHub Pages.</span>
    </footer>
</body>
</html>
