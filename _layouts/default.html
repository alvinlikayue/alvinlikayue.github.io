<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">
            <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="" class="brand-logo">
            <span>
                <strong>{{ site.title }}</strong>
                <small>Gravitational-wave physics</small>
            </span>
        </a>

        <nav class="site-nav" aria-label="Main navigation">
            {% for item in site.navigation %}
                <a href="{{ item.url | relative_url }}" {% if page.nav_key == item.key %}aria-current="page"{% endif %}>{{ item.title }}</a>
            {% endfor %}
        </nav>
    </header>

    <main class="page-shell">
        {{ content }}
    </main>

    <footer class="site-footer">
        <span>&copy; {{ "now" | date: "%Y" }} {{ site.title }}</span>
        <span>Built with GitHub Pages.</span>
    </footer>
</body>
</html>
